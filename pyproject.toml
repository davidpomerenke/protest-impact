[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "protest_impact"
version = "0.1.0"
description = ""
authors = ["David Pomerenke <davidpomerenke@mailbox.org>"]
license = "GPL-3.0-or-later"
readme = "README.md"
packages = [{include = "protest_impact"}]

[tool.poetry.dependencies]
python = "^3.10"
joblib = "^1.2.0"
requests = "^2.28.1"
python-dotenv = "^0.21.0"
faker = "^15.3.4"
pandas = "^1.5.2"
seaborn = "^0.12.1"
readability-lxml = "^0.8.1"
html2text = "^2020.1.16"

[tool.poetry.group.dev.dependencies]
black = "^22.12.0"
pytest = "^7.2.0"
jupyter = "^1.0.0"
ipykernel = "^6.19.2"
pre-commit = "^2.20.0"

[tool.isort]
profile = "black"
